  <script>
  /* ════════════════════════════════════════════════
     🔐 إدارة جلسة المستخدم (الإيميل + الاسم)
     ════════════════════════════════════════════════ */
  (function(){
    var API_BASE = 'https://fasih-api.almalkimaha8.workers.dev';
    var STORAGE_KEY = 'fasih:user';

    function readUser(){
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
      catch(e){ return null; }
    }
    function saveUser(u){
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); } catch(e){}
    }
    function clearUser(){
      try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
    }

    // كشف معلومات المستخدم والـ API base للكود الرئيسي
    window.FASIH_API_BASE = API_BASE;
    Object.defineProperty(window, 'FASIH_USER', {
      get: readUser, configurable: true
    });
    Object.defineProperty(window, 'FASIH_API_KEY', {
      // متغير قديم للتوافق — نتركه يرجع شيئًا غير فارغ ليمر فحص الكود
      get: function(){ var u = readUser(); return u ? 'SERVER' : ''; },
      configurable: true
    });

    function showSetup(){
      document.getElementById('key-setup').classList.add('show');
      setTimeout(function(){ var n = document.getElementById('user-name'); if(n) n.focus(); }, 100);
    }
    function hideSetup(){ document.getElementById('key-setup').classList.remove('show'); }
    function showBtn(){ var b=document.getElementById('key-btn'); if(b) b.style.display='block'; }
    function hideBtn(){ var b=document.getElementById('key-btn'); if(b) b.style.display='none'; }

    function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    document.addEventListener('DOMContentLoaded', function(){
      var saveBtn = document.getElementById('api-key-save');
      var nameInput = document.getElementById('user-name');
      var emailInput = document.getElementById('user-email');
      var err = document.getElementById('api-key-err');
      var changeBtn = document.getElementById('key-btn');

      async function trySave(){
        var name = (nameInput.value||'').trim();
        var email = (emailInput.value||'').trim().toLowerCase();
        if(!name){ err.textContent = 'الرجاء كتابة اسمك.'; nameInput.focus(); return; }
        if(name.length < 2){ err.textContent = 'الاسم قصير جدًا.'; nameInput.focus(); return; }
        if(!email){ err.textContent = 'الرجاء كتابة بريدك الإلكتروني.'; emailInput.focus(); return; }
        if(!isValidEmail(email)){ err.textContent = 'البريد الإلكتروني غير صحيح.'; emailInput.focus(); return; }
        err.textContent = '';
        saveBtn.disabled = true;
        saveBtn.textContent = 'جارٍ الدخول...';
        try {
          var r = await fetch(API_BASE + '/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, email: email })
          });
          var data = await r.json();
          if(!r.ok){
            err.textContent = data.error || 'تعذّر تسجيل الدخول. حاول لاحقًا.';
            saveBtn.disabled = false;
            saveBtn.textContent = 'دخول';
            return;
          }
          saveUser({ name: name, email: email });
          hideSetup();
          showBtn();
        } catch(e){
          err.textContent = 'تعذّر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.';
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'دخول';
        }
      }

      saveBtn.addEventListener('click', trySave);
      nameInput.addEventListener('keydown', function(e){ if(e.key==='Enter') emailInput.focus(); });
      emailInput.addEventListener('keydown', function(e){ if(e.key==='Enter') trySave(); });
      changeBtn.addEventListener('click', function(){
        if(confirm('هل تريد تسجيل الخروج؟ ستحتاج لإدخال بياناتك مرة أخرى.')){
          clearUser();
          hideBtn();
          showSetup();
        }
      });

      if(!readUser()){ showSetup(); } else { showBtn(); }
    });
  })();
  </script>

  <script>
/* ─── تخزين البيانات في المتصفح ─── */
window.storage = {
  async get(key) {
    try {
      const v = localStorage.getItem('fs:' + key);
      return v === null ? null : {
        key,
        value: v
      };
    } catch (e) {
      return null;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem('fs:' + key, value);
      return {
        key,
        value
      };
    } catch (e) {
      throw new Error('فشل الحفظ');
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem('fs:' + key);
      return {
        key,
        deleted: true
      };
    } catch (e) {
      return null;
    }
  }
};
const {
  useState,
  useEffect,
  useRef,
  useCallback
} = React;

/* ═══════════════════════════════════════════════════
   FASIH — Complete Production Website v2.0
   Design System × Full Functionality

/* ─── Constants ─── */
const MODEL = 'claude-sonnet-4-20250514';
const PROFILE_LIST_KEY = 'profiles:list';
const HISTORY_LIST_KEY = 'history:list';
const TEMPLATE_LIST_KEY = 'templates:list';
const safeGet = async k => {
  try {
    return await window.storage.get(k);
  } catch {
    return null;
  }
};
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
async function loadProfiles() {
  const r = await safeGet(PROFILE_LIST_KEY);
  if (!r) return [];
  try {
    const ids = JSON.parse(r.value),
      out = [];
    for (const id of ids) {
      const p = await safeGet(`profile:${id}`);
      if (p) try {
        out.push(JSON.parse(p.value));
      } catch {}
    }
    return out.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  } catch {
    return [];
  }
}
async function saveProfile(p) {
  await window.storage.set(`profile:${p.id}`, JSON.stringify(p));
  const r = await safeGet(PROFILE_LIST_KEY);
  const ids = r ? JSON.parse(r.value) : [];
  if (!ids.includes(p.id)) {
    ids.push(p.id);
    await window.storage.set(PROFILE_LIST_KEY, JSON.stringify(ids));
  }
}
async function deleteProfile(id) {
  try {
    await window.storage.delete(`profile:${id}`);
  } catch {}
  const r = await safeGet(PROFILE_LIST_KEY);
  const ids = r ? JSON.parse(r.value) : [];
  await window.storage.set(PROFILE_LIST_KEY, JSON.stringify(ids.filter(i => i !== id)));
}
async function loadHistory() {
  const r = await safeGet(HISTORY_LIST_KEY);
  if (!r) return [];

    const ids = JSON.parse(r.value),
      out = [];
    for (const id of ids) {
      const l = await safeGet(`letter:${id}`);

        out.push(JSON.parse(l.value));
      } catch {}
    }
    return out.sort((a, b) => (b.generatedAt || 0) - (a.generatedAt || 0));

    return [];
  }
}

/* ─── AI ─── */
async function callClaude(messages, system, maxTokens = 4000) {
  const body = {
    model: MODEL,
    max_tokens: maxTokens,
    messages
  };
  if (system) body.system = system;
  var user = window.FASIH_USER;
  if (!user || !user.email) {
    document.getElementById('key-setup').classList.add('show');
    throw new Error('الرجاء تسجيل الدخول للمتابعة');
  }
  const res = await fetch(window.FASIH_API_BASE + '/claude', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(Object.assign({ email: user.email }, body))
  });
  if (!res.ok) {
    var errText = await res.text().catch(() => '');
    var errMsg = '';
    try { errMsg = (JSON.parse(errText) || {}).error || ''; } catch(_){}
    if (res.status === 401) {
      try { localStorage.removeItem('fasih:user'); } catch(_){}
      document.getElementById('key-setup').classList.add('show');
      throw new Error(errMsg || 'الرجاء تسجيل الدخول مرة أخرى.');
    }
    if (res.status === 429) {
      throw new Error(errMsg || 'وصلت الحد اليومي. حاول غدًا.');
    }
    if (res.status === 503) {
      throw new Error(errMsg || 'البرنامج وصل حده اليومي. الرجاء المحاولة غدًا.');
    }
    throw new Error(errMsg || ('فشل الاتصال (' + res.status + ')'));
  }
  const data = await res.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
}
async function analyzeStyle(letters, refs = []) {
  const txt = letters.map((l, i) => `═══ الخطاب رقم ${i + 1}${l.title ? ` — ${l.title}` : ''} ═══\n${l.content}`).join('\n\n');
  const rb = refs.length ? `\n\nأدلة تحريرية:\n\n${refs.map((r, i) => `── مرجع ${i + 1}: ${r.name} ──\n${r.content}`).join('\n\n')}` : '';
  const sys = `أنت محلل أسلوب كتابة عربي خبير.`;
  const usr = `حلل الخطابات التالية واستخرج البصمة الأسلوبية الدقيقة للكاتب في صورة دليل أسلوبي مفصل قابل للتطبيق:\n\n${txt}${rb}\n\nاستخرج: النبرة، الافتتاح المعتاد، الاختتام، المفردات المميزة، طول الجمل، الضمائر، علامات الترقيم، بصمات مميزة. أعطِ أمثلة حرفية من النصوص. ابدأ مباشرة بالتحليل بدون مقدمة.`;
  return await callClaude([{
    role: 'user',
    content: usr
  }], sys, 4000);
}
async function generateLetterAI(profile, params) {
  const ex = profile.letters.slice(0, 2).map((l, i) => `── مثال ${i + 1} ──\n${l.content}`).join('\n\n');
  const refs = profile.references || [];
  const rb = refs.length ? `\n\n═══ أدلة إلزامية (لها الأولوية المطلقة) ═══\n${refs.map((r, i) => `── ${r.name} ──\n${r.content}`).join('\n\n')}\n\nطبّق صيغ المخاطبة والاختتام الصحيحة حسب رتبة المستلم.` : '';
  const docs = params.supportingDocs || [];
  const db = docs.length ? `\n\n═══ مستندات داعمة ═══\n${docs.map((d, i) => `── ${d.name || `مستند ${i + 1}`}${d.purpose ? ` [${d.purpose}]` : ''} ──\n${d.content}`).join('\n\n')}` : '';
  const sys = `أنت كاتب خطابات عربية محترف يحاكي أسلوب الكاتب بدقة ويلتزم بالأدلة التحريرية.`;
  const usr = `الدليل الأسلوبي:\n${profile.styleProfile}\n\n═══ أمثلة فعلية ═══\n${ex}${rb}${db}\n\n═══ الخطاب المطلوب ═══\n• المستلم: ${params.recipient}\n• الموضوع: ${params.subject}\n• الهدف: ${params.purpose}${params.keyPoints ? `\n• النقاط: ${params.keyPoints}` : ''}${params.tone ? `\n• النبرة: ${params.tone}` : ''}\n\nاكتب الخطاب كاملاً جاهزاً للإرسال. لا تكتب أي شرح قبله أو بعده.`;
  return await callClaude([{
    role: 'user',
    content: usr
  }], sys, 3500);
}

/* ─── Word Export ─── */
const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const isGreetingLine = l => /السلام عليكم/.test(l) && l.length < 90;
const isClosingLine = l => l.length < 130 && /^[\s.،,]{0,5}(وتفضلوا[\s\u200f]+بقبول|وتقبلوا[\s\u200f]+(تحياتي|أطيب|قبول)|والسلام\s+عليكم|والله\s+ولي\s+التوفيق|تفضلوا\s+بقبول)/.test(l);
const FONT_STACK = "'Sakkal Majalla','Traditional Arabic','Simplified Arabic','Tajawal','Arial',sans-serif";
const isNamePlaceholder = l => /^\[\s*(الاسم|الاسم\s+الثلاثي|اسم\s+المرسل|الموقع|التوقيع|name|signature)\s*\]$/i.test(l.trim().replace(/[،,.\s]+$/g, ''));
function exportToWord(title, content, template = null) {
  const rawLines = content.split(/\n+/).map(p => p.trim()).filter(Boolean);
  const hasName = template && (template.senderName || template.senderTitle);
  const lines = hasName ? rawLines.filter(l => !isNamePlaceholder(l)) : rawLines;
  const body = lines.map(line => {
    const e = escapeHtml(line);
    if (isClosingLine(line)) return `<p style="font-family:${FONT_STACK};font-weight:bold;text-align:center;margin:24pt 0 24pt 0"><b>${e}</b></p>`;
    if (isGreetingLine(line)) return `<p style="font-family:${FONT_STACK};font-weight:bold"><b>${e}</b></p>`;
    return `<p style="font-family:${FONT_STACK}">${e}</p>`;
  }).join('\n');
  let hdr = '';
  if (template) {
    const t = template;
    const org = [t.orgLine1 ? `<div style="font-size:12pt;font-family:${FONT_STACK}">${escapeHtml(t.orgLine1)}</div>` : '', t.orgLine2 ? `<div style="font-size:14pt;font-weight:bold;font-family:${FONT_STACK};margin-top:2pt">${escapeHtml(t.orgLine2)}</div>` : '', t.orgLine3 ? `<div style="font-size:11pt;color:#555;font-family:${FONT_STACK};margin-top:2pt">${escapeHtml(t.orgLine3)}</div>` : ''].filter(Boolean).join('');
    if (org || t.logoDataUrl) {
      hdr = `<table dir="rtl" style="width:100%;border-collapse:collapse;margin:0 0 24pt 0"><tr><td style="width:35%;vertical-align:top;text-align:right">${t.logoDataUrl ? `<img src="${t.logoDataUrl}" style="max-height:90px;max-width:220px" alt="logo"/>` : ''}  </td><td style="width:65%;vertical-align:top;text-align:left;padding:4pt 16pt 0 0">${org}</td></tr></table><div style="border-top:1.5pt solid #b08d57;margin:0 0 24pt 0"></div>`;
    }
  }
